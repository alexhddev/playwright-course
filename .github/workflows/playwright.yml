name: Playwright test

on:
  push:
    branches: ["zz-debug"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Starter
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./Starter/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build app
        run: npm run build
        
  test_integration:
    defaults:
      run:
        working-directory: ./Starter
    name: Integration Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 22
            cache: npm
            cache-dependency-path: ./Starter/package-lock.json
        - name: Install dependencies
          run: npm ci

        - name: Install Playwright Browsers
          run: npx playwright install --with-deps
          
        - name: Run Playwright tests
          run: npx playwright test tests/debug
          
        - uses: actions/upload-artifact@v4
          if: ${{ !cancelled() }}
          with:
            name: Integration Tests (Playwright)
            path: Starter/test-results